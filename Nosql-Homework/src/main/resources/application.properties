spring.application.name=Nosql-Homework

# MongoDB
spring.data.mongodb.uri=mongodb://mongo:123456@localhost:27017/nosql_homework?authSource=admin
spring.data.mongodb.auto-index-creation=false
spring.data.mongodb.connection-timeout=10000
spring.data.mongodb.socket-timeout=10000

# Server
server.port=8080

# Logging
logging.level.com.example.Nosql_Homework=DEBUG

# LangChain4j - LLM (OpenAI 兼容接口，支持国产大模型)
langchain4j.openai.api-key=${LLM_API_KEY:your-api-key-here}
langchain4j.openai.base-url=${LLM_BASE_URL:https://api.openai.com/v1}
langchain4j.openai.model-name=${LLM_MODEL:gpt-4o-mini}
langchain4j.openai.temperature=0.3
langchain4j.openai.max-tokens=2000
langchain4j.openai.timeout-seconds=60
