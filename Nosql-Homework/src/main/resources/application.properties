spring.application.name=Nosql-Homework

spring.config.import=optional:classpath:application-local.properties

# MongoDB
spring.mongodb.uri=${MONGO_URI:mongodb://mongo:123456@localhost:27017/nosql_homework?authSource=admin}
spring.data.mongodb.auto-index-creation=false

# Server
server.port=8080

# SpringDoc OpenAPI (Swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.com.example.Nosql_Homework=DEBUG

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.scheduler.instanceName=GitHubCrawlerScheduler

# GitHub API
github.tokens=${GITHUB_TOKENS:}

# LangChain4j - LLM
langchain4j.openai.api-key=${LLM_API_KEY:unset}
langchain4j.openai.base-url=${LLM_BASE_URL:https://api.deepseek.com}
langchain4j.openai.model-name=${LLM_MODEL:deepseek-v4-pro}
langchain4j.openai.temperature=0.3
langchain4j.openai.max-tokens=2000
langchain4j.openai.timeout-seconds=60
