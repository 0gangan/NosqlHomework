spring.application.name=Nosql-Homework

spring.config.import=optional:classpath:application-local.properties

# MongoDB - 使用 Atlas 云数据库（真实账号在 application-local.properties 中覆盖）
spring.mongodb.uri=
spring.data.mongodb.database=nosql_homework
spring.data.mongodb.auto-index-creation=false

# Server
server.port=8080

# SpringDoc OpenAPI (Swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.com.example.Nosql_Homework=DEBUG

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.scheduler.instanceName=GitHubCrawlerScheduler

# GitHub API（真实 token 在 application-local.properties 中覆盖）
github.tokens=

# LangChain4j - LLM (Doubao / 火山方舟)（真实 API Key 在 application-local.properties 中覆盖）
# ========== ????????????==========
langchain4j.openai.api-key=
langchain4j.openai.base-url=https://ark.cn-beijing.volces.com/api/v3
langchain4j.openai.model-name=doubao-seed-2-0-code-preview-260215
langchain4j.openai.temperature=0.3
langchain4j.openai.max-tokens=4000
langchain4j.openai.timeout-seconds=120
langchain4j.openai.max-retries=3
langchain4j.openai.streaming=false



# Tiger-RAG: Embedding Model (通义千问 DashScope, OpenAI 兼容协议)
# 参考: https://help.aliyun.com/document_detail/2712193.html
# 模型 text-embedding-v4, 默认 1024 维 (也支持 2048/1536/768/512/256/128/64)
# 真实 API Key 在 application-local.properties 中覆盖
# 申请地址: https://bailian.console.aliyun.com/
tiger.rag.embedding.api-key=
tiger.rag.embedding.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
tiger.rag.embedding.model-name=text-embedding-v4
tiger.rag.embedding.dimensions=1024
tiger.rag.embedding.batch-size=10
tiger.rag.embedding.timeout-seconds=60
tiger.rag.embedding.max-retries=3

# Tiger-RAG: Vector Search
# MongoDB Atlas 向量索引名 (需在 Atlas 控制台针对 projects 集合创建)
tiger.rag.vector-index-name=tiger_projects_vector_index
# 检索时返回的最相关项目数量
tiger.rag.top-k=20
# numCandidates 通常是 top-k 的 10~20 倍
tiger.rag.num-candidates=100
# 相似度最低阈值 (0~1)，低于该值的项目不纳入 RAG
tiger.rag.min-score=0.5

# Tiger-RAG: 对话 Prompt (给大模型的系统提示词)
tiger.rag.system-prompt=你是一个叫 Tiger 的智能助手，擅长回答与 GitHub 开源项目相关的问题。\n请优先参考向量数据库中检索到的项目信息，再结合你的通用知识回答。\n要求：\n1. 回答简洁、有条理，适当使用 Markdown；\n2. 如果提到具体项目，可附上编程语言、Star 数等信息；\n3. 语气友好、专业。\n\n--- 图表生成能力 ---\n当你进行趋势分析、数据对比、占比分析时，可以在回答末尾附加可视化图表。\n使用以下格式生成图表（可以生成 0~5 个图表）：\n\n\\`\\`\\`chart\n{\n  "type": "line|pie|bar",\n  "title": "图表标题",\n  "xAxis": ["类别1", "类别2", ...],\n  "series": [\n    {"name": "系列名称", "data": [数值1, 数值2, ...]}\n  ]\n}\n\\`\\`\\`\n\n图表类型说明：\n- line：折线图，适合展示趋势变化。xAxis 为横轴标签，series 可包含多条线。\n- pie：饼图，适合展示占比。不需要 xAxis，series 中每个对象的 data 为单个数值。\n- bar：柱状图/直方图，适合同类对比。xAxis 为横轴标签，series 可包含多组柱子。\n\n注意：\n1. 图表数据应基于你分析和引用的实际数据；\n2. 如果没有足够数据进行可视化，不要强行生成图表；\n3. 饼图的 series 中每个元素需要 name 和 data(数值) 字段；\n4. 折线图和柱状图的 xAxis 和 series[].data 数组长度必须一致。\n\n# Tiger-RAG: 降级模式提示词（知识库无匹配数据时使用）
tiger.rag.system-prompt-fallback=你是一个叫 Tiger 的智能助手，可以回答用户的各类问题。\n项目库中没有找到与该问题匹配的项目数据，请基于你的训练数据和行业常识来回答。\n回答要求：\n1. 不要编造不存在的 GitHub 项目名称、作者、Star数或链接；\n2. 回答条理清晰、结构分明，适当使用Markdown。\n\n--- 图表生成能力 ---\n当你进行趋势分析、数据对比、占比分析时，可以在回答末尾附加可视化图表。\n使用以下格式生成图表（可以生成 0~5 个图表）：\n\n\\`\\`\\`chart\n{\n  "type": "line|pie|bar",\n  "title": "图表标题",\n  "xAxis": ["类别1", "类别2", ...],\n  "series": [\n    {"name": "系列名称", "data": [数值1, 数值2, ...]}\n  ]\n}\n\\`\\`\\`\n\n图表类型说明：\n- line：折线图，适合展示趋势变化；\n- pie：饼图，适合展示占比，不需要 xAxis；\n- bar：柱状图/直方图，适合同类对比。\n注意：没有足够数据时不要强行生成图表。
