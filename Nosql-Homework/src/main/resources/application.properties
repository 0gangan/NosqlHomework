spring.application.name=Nosql-Homework

spring.config.import=optional:classpath:application-local.properties

# MongoDB - 使用 Atlas 云数据库（真实账号在 application-local.properties 中覆盖）
spring.mongodb.uri=mongodb+srv://user:password@your-cluster.mongodb.net/nosql_homework?readPreference=primary&retryWrites=true&w=majority
spring.data.mongodb.database=nosql_homework
spring.data.mongodb.auto-index-creation=false

# Server
server.port=8080

# SpringDoc OpenAPI (Swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.com.example.Nosql_Homework=DEBUG

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.scheduler.instanceName=GitHubCrawlerScheduler

# GitHub API（真实 token 在 application-local.properties 中覆盖）
github.tokens=YOUR_GITHUB_TOKEN_HERE

# LangChain4j - LLM (Doubao / 火山方舟)（真实 API Key 在 application-local.properties 中覆盖）
# ========== ????????????==========
langchain4j.openai.api-key=YOUR_DOUBAO_API_KEY_HERE
langchain4j.openai.base-url=https://ark.cn-beijing.volces.com/api/v3
langchain4j.openai.model-name=doubao-seed-2-0-code-preview-260215
langchain4j.openai.temperature=0.3
langchain4j.openai.max-tokens=4000
langchain4j.openai.timeout-seconds=120
langchain4j.openai.streaming=false



# Tiger-RAG: Embedding Model (DeepSeek, 独立 API)
# 参考: https://api.deepseek.com/v1
# small -> deepseek-embedding-3-small  (1536 维)
# large -> deepseek-embedding-3-large  (3072 维)
# 真实 API Key 在 application-local.properties 中覆盖
tiger.rag.embedding.api-key=YOUR_DEEPSEEK_EMBED_API_KEY_HERE
tiger.rag.embedding.base-url=https://api.deepseek.com/v1
tiger.rag.embedding.model-name=deepseek-embedding-3-small
tiger.rag.embedding.dimensions=1536
tiger.rag.embedding.batch-size=20

# Tiger-RAG: Vector Search
# MongoDB Atlas 向量索引名 (需在 Atlas 控制台针对 projects 集合创建)
tiger.rag.vector-index-name=tiger_projects_vector_index
# 检索时返回的最相关项目数量
tiger.rag.top-k=5
# numCandidates 通常是 top-k 的 10~20 倍
tiger.rag.num-candidates=100
# 相似度最低阈值 (0~1)，低于该值的项目不纳入 RAG
tiger.rag.min-score=0.5

# Tiger-RAG: 对话 Prompt (给大模型的系统提示词)
tiger.rag.system-prompt=你是一个叫 Tiger 的智能助手，擅长回答与 GitHub 开源项目相关的问题。\n请优先参考向量数据库中检索到的项目信息，再结合你的通用知识回答。\n要求：\n1. 回答简洁、有条理，适当使用 Markdown；\n2. 如果提到具体项目，可附上编程语言、Star 数等信息；\n3. 语气友好、专业。
